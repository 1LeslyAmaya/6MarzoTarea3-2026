{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

<h2>{{ title }}</h2>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-success">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        Guardar Cambios
    </button>

    <a href="{% url 'alumno:asignaciones_list' %}" class="btn btn-secondary">
        Cancelar
    </a>
</form>

</div>
{% endblock %}
